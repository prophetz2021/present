  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng:19px; font-size:18px; font-weight:800; color:white; cursor:pointer; font-family:'Noto Sans Thai',sans-serif; transition:all 0.12s\" style-hover=\"background:#3D2B1F\">{{ checkButtonLabel }}<\/button>\n          <div style=\"text-align:center; margin-top:10px; font-size:12px; color:#B09080\">เมื่อจ่ายผ่าน QR ระบบจะต่ออายุให้อัตโนมัติ ไม่ต้องกดยืนยัน<\/div>\n        <\/div>\n\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1080},&quot;shopName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;จงชงดี กุฉินารายณ์ ☕&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;shopType&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ร้านชานม&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#C85A38&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;phoneNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;081-234-5678&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\n\nclass Component extends DCLogic {\n  state = {\n    cart: { 1: 2, 5: 1 },\n    activeCategory: 'ทั้งหมด',\n    paymentMethod: 'qr',\n    confirmed: false,\n    // Screen 4\n    editingProductId: null,\n    deleteConfirmId: null,\n    productEdits: {},\n    deletedIds: [],\n    editingCat: null,\n    // Screen 5\n    onboardShopType: 'เครื่องดื่ม',\n    // Screen 6\n    reportPeriod: 'วันนี้',\n    // Screen 7\n    selectedOrderId: null,\n    // Auth & Shift (ชุด 1)\n    loginStep: 'phone',        // 'phone' | 'otp'\n    eulaChecked: false,\n    openingCashPreset: 500,\n    // ขาย/ชำระเงิน (ชุด 2)\n    optionPickerProductId: null,\n    optionSweetness: 'หวานปกติ',\n    optionSize: 'M',\n    optionPearl: false,\n    showScanOverlay: false,\n    cashReceivedPreset: 'exact',   // 'exact' | 100 | 500 | 1000\n    closingCashCounted: 1240,\n    // หน้ารวมจัดการร้าน (ชุด 3)\n    viewRole: 'owner',              // 'owner' | 'staff' (demo toggle)\n    themeColorSelected: '#C85A38',\n    promoActiveToggle: { 1: true, 2: true, 3: false, 4: true },\n    // Billing (ชุด 4)\n    trialBannerDay: 7,               // demo cycle: 7 -> 3 -> 1\n    billingCheckState: 'idle',       // 'idle' | 'checking' | 'confirmed'\n  };\n\n  PRODUCTS = [\n    { id: 1,  cat: 'ชานม',      name: 'ชาไทยนม',    price: 35, bg: '#E8A278', emoji: '🧋' },\n    { id: 2,  cat: 'ชานม',      name: 'ชานมไข่มุก',  price: 45, bg: '#C8724A', emoji: '🧋' },\n    { id: 3,  cat: 'ชานม',      name: 'มัทฉะนม',    price: 50, bg: '#7E9E6A', emoji: '🍵' },\n    { id: 4,  cat: 'ชานม',      name: 'โกโก้นม',    price: 40, bg: '#7A4F35', emoji: '🍫' },\n    { id: 5,  cat: 'กาแฟ',      name: 'กาแฟเย็น',   price: 30, bg: '#5C3A25', emoji: '☕' },\n    { id: 6,  cat: 'กาแฟ',      name: 'ลาเต้เย็น',  price: 40, bg: '#8B5E40', emoji: '☕' },\n    { id: 7,  cat: 'กาแฟ',      name: 'อเมริกาโน',  price: 25, bg: '#3D2510', emoji: '☕' },\n    { id: 8,  cat: 'เครื่องดื่ม', name: 'น้ำมะนาว',  price: 25, bg: '#BFCA50', emoji: '🍋' },\n    { id: 9,  cat: 'เครื่องดื่ม', name: 'ส้มคั้น',   price: 30, bg: '#E88C28', emoji: '🍊' },\n    { id: 10, cat: 'ของว่าง',    name: 'ขนมปังปิ้ง', price: 20, bg: '#D4A870', emoji: '🍞' },\n    { id: 11, cat: 'ของว่าง',    name: 'วาฟเฟิล',   price: 35, bg: '#C49660', emoji: '🧇' },\n    { id: 12, cat: 'ของว่าง',    name: 'ไอศกรีม',   price: 20, bg: '#E8C8A0', emoji: '🍦' },\n  ];\n\n  CATEGORIES = ['ทั้งหมด', 'ชานม', 'กาแฟ', 'เครื่องดื่ม', 'ของว่าง'];\n\n  SALES_BARS = [\n    { label: 'จ', amt: 1240 },\n    { label: 'อ', amt: 980 },\n    { label: 'พ', amt: 1560 },\n    { label: 'พฤ', amt: 1120 },\n    { label: 'ศ', amt: 1890 },\n    { label: 'ส', amt: 2340 },\n    { label: 'อา', amt: 1680 },\n  ];\n\n  TOP_SALES = { 1: 42, 5: 38, 2: 31, 6: 24, 3: 19 };\n\n  ORDER_HISTORY = [\n    { id: 501, time: '21:38', itemIds: [1, 1, 5], payment: 'qr',     total: 100 },\n    { id: 500, time: '20:52', itemIds: [2, 8],     payment: 'cash',   total: 70  },\n    { id: 499, time: '19:30', itemIds: [6, 6, 11], payment: 'qr',     total: 115 },\n    { id: 498, time: '18:14', itemIds: [3],         payment: 'transfer', total: 50 },\n    { id: 497, time: '17:05', itemIds: [5, 5, 9, 10], payment: 'cash', total: 95 },\n  ];\n\n  PROMOTIONS = [\n    { id: 1, name: 'ลดสมาชิกใหม่', type: 'percent_off',  detail: 'ลด 10% ทั้งบิล',         dateState: 'active' },\n    { id: 2, name: 'ซื้อ 2 แถม 1 ชานมไข่มุก', type: 'buy_x_get_y', detail: 'ซื้อ 2 แถม 1', dateState: 'active' },\n    { id: 3, name: 'โปรปีใหม่', type: 'fixed_off',       detail: 'ลด 20 บาท เฉพาะกาแฟเย็น', dateState: 'upcoming' },\n    { id: 4, name: 'ซื้อครบ 70 ลด 10', type: 'min_purchase_discount', detail: 'ซื้อครบ 70 บาท ลด 10', dateState: 'active' },\n  ];\n\n  STAFF_LIST = [\n    { id: 1, name: 'น้องเอ้', phone: '081-234-5678', role: 'staff', status: 'accepted' },\n    { id: 2, name: 'น้องบี', phone: '089-555-1234', role: 'staff', status: 'pending' },\n  ];\n\n  SHIFT_HISTORY = [\n    { id: 1, date: '22 มิ.ย. 69', openedAt: '08:30', closedAt: '20:15', opening: 500, variance: 0 },\n    { id: 2, date: '21 มิ.ย. 69', openedAt: '08:45', closedAt: '20:02', opening: 500, variance: -30 },\n    { id: 3, date: '20 มิ.ย. 69', openedAt: '08:20', closedAt: '19:50', opening: 500, variance: 50 },\n  ];\n\n  addToCart(id) {\n    this.setState(s => ({ cart: { ...s.cart, [id]: (s.cart[id] || 0) + 1 } }));\n  }\n\n  updateCart(id, delta) {\n    this.setState(s => {\n      const cart = { ...s.cart };\n      const next = (cart[id] || 0) + delta;\n      if (next <= 0) delete cart[id];\n      else cart[id] = next;\n      return { cart };\n    });\n  }\n\n  openOptionPicker(productId) {\n    this.setState({ optionPickerProductId: productId, optionSweetness: 'หวานปกติ', optionSize: 'M', optionPearl: false });\n  }\n\n  closeOptionPicker() {\n    this.setState({ optionPickerProductId: null });\n  }\n\n  confirmOptionAdd() {\n    this.setState(s => {\n      const id = s.optionPickerProductId;\n      if (id == null) return {};\n      return { cart: { ...s.cart, [id]: (s.cart[id] || 0) + 1 }, optionPickerProductId: null };\n    });\n  }\n\n  openScan() {\n    this.setState({ showScanOverlay: true });\n  }\n\n  closeScan() {\n    this.setState({ showScanOverlay: false });\n  }\n\n  scanAndAdd() {\n    // จำลองว่าสแกนเจอสินค้าแล้วหยิบเข้าตะกร้า (mockup)\n    this.setState(s => ({ cart: { ...s.cart, 1: (s.cart[1] || 0) + 1 }, showScanOverlay: false }));\n  }\n\n  toggleViewRole() {\n    this.setState(s => ({ viewRole: s.viewRole === 'owner' ? 'staff' : 'owner' }));\n  }\n\n  selectThemeColor(color) {\n    this.setState({ themeColorSelected: color });\n  }\n\n  togglePromoActive(id) {\n    this.setState(s => ({ promoActiveToggle: { ...s.promoActiveToggle, [id]: !s.promoActiveToggle[id] } }));\n  }\n\n  cycleTrialBanner() {\n    const order = [7, 3, 1];\n    this.setState(s => {\n      const idx = order.indexOf(s.trialBannerDay);\n      return { trialBannerDay: order[(idx + 1) % order.length] };\n    });\n  }\n\n  checkPayment() {\n    this.setState(s => {\n      if (s.billingCheckState === 'idle') return { billingCheckState: 'checking' };\n      if (s.billingCheckState === 'checking') return { billingCheckState: 'confirmed' };\n      return { billingCheckState: 'idle' };\n    });\n  }\n\n  renderVals() {\n    const {\n      cart, activeCategory, paymentMethod, confirmed,\n      editingProductId, deleteConfirmId, productEdits, deletedIds, editingCat,\n      onboardShopType, reportPeriod, selectedOrderId,\n      loginStep, eulaChecked, openingCashPreset,\n      optionPickerProductId, optionSweetness, optionSize, optionPearl,\n      showScanOverlay, cashReceivedPreset, closingCashCounted,\n      viewRole, themeColorSelected, promoActiveToggle,\n      trialBannerDay, billingCheckState,\n    } = this.state;\n    const entries = Object.entries(cart);\n    const cartCount = entries.reduce((s, [, q]) => s + q, 0);\n    const cartTotal = entries.reduce((s, [id, q]) => {\n      const p = this.PRODUCTS.find(x => x.id === +id);\n      return s + (p ? p.price * q : 0);\n    }, 0);\n    const hasCart = cartCount > 0;\n    const isEmpty = !hasCart;\n    const notConfirmed = !confirmed;\n\n    // === ส่วนลดโปรโมชั่น (demo: ซื้อครบ 70 ลด 10) ===\n    const promoApplied = cartTotal >= 70;\n    const discountAmount = promoApplied ? 10 : 0;\n    const finalTotal = Math.max(0, cartTotal - discountAmount);\n\n    // === เงินที่รับมา / เงินทอน ===\n    const cashReceivedAmount = cashReceivedPreset === 'exact' ? finalTotal : cashReceivedPreset;\n    const changeDue = Math.max(0, cashReceivedAmount - finalTotal);\n    const insufficientPay = cashReceivedAmount < finalTotal;\n\n    const filtered = activeCategory === 'ทั้งหมด'\n      ? this.PRODUCTS\n      : this.PRODUCTS.filter(p => p.cat === activeCategory);\n\n    const filteredProducts = filtered.map(p => {\n      const qty = cart[p.id] || 0;\n      const hasOptions = p.cat === 'ชานม';\n      return {\n        ...p,\n        qty,\n        inCart: qty > 0,\n        add: () => hasOptions ? this.openOptionPicker(p.id) : this.addToCart(p.id),\n        hasOptions,\n        tagBg:     qty > 0 ? '#F4A22A' : 'transparent',\n        tagColor:  qty > 0 ? '#2D1F15' : 'transparent',\n        tagBorder: qty > 0 ? 'white'   : 'transparent',\n      };\n    });\n\n    const cartItems = entries.map(([id, qty]) => {\n      const p = this.PRODUCTS.find(x => x.id === +id);\n      return p ? {\n        ...p,\n        qty,\n        subtotal: p.price * qty,\n        increase: () => this.updateCart(+id,  1),\n        decrease: () => this.updateCart(+id, -1),\n      } : null;\n    }).filter(Boolean);\n\n    const categories = this.CATEGORIES.map(cat => ({\n      label:  cat,\n      bg:     cat === activeCategory ? '#F4A22A'             : 'rgba(255,255,255,0.18)',\n      color:  cat === activeCategory ? '#2D1F15'             : 'rgba(255,255,255,0.9)',\n      weight: cat === activeCategory ? '800'                 : '500',\n      select: () => this.setState({ activeCategory: cat }),\n    }));\n\n    const paymentMethods = [\n      { id: 'cash',     label: 'เงินสด',  icon: '💵' },\n      { id: 'qr',       label: 'พร้อมเพย์', icon: '📲' },\n      { id: 'transfer', label: 'โอนเงิน', icon: '🏦' },\n    ].map(m => ({\n      ...m,\n      bg:     paymentMethod === m.id ? '#C85A38' : '#FFFAF4',\n      color:  paymentMethod === m.id ? 'white'   : '#2D1F15',\n      border: paymentMethod === m.id ? '#C85A38' : '#E8D0C0',\n      select: () => this.setState({ paymentMethod: m.id }),\n    }));\n\n    const showQR   = paymentMethod === 'qr' || paymentMethod === 'transfer';\n    const showCash = paymentMethod === 'cash';\n\n    // === Screen 4: จัดการสินค้า ===\n    const manageProducts = this.PRODUCTS\n      .filter(p => !deletedIds.includes(p.id))\n      .map(p => {\n        const ov = productEdits[p.id] || {};\n        return {\n          ...p,\n          name:  ov.name  || p.name,\n          price: ov.price || p.price,\n          cat:   ov.cat   || p.cat,\n          edit:       () => this.setState({ editingProductId: p.id, editingCat: ov.cat || p.cat }),\n          deleteItem: () => this.setState({ deleteConfirmId: p.id }),\n        };\n      });\n\n    const isEditing = editingProductId !== null;\n    const editingProduct = isEditing ? manageProducts.find(p => p.id === editingProductId) : null;\n    const editingName  = editingProduct ? editingProduct.name  : '';\n    const editingPrice = editingProduct ? editingProduct.price : 0;\n    const currentCat   = editingCat || (editingProduct ? editingProduct.cat : '');\n\n    const editCats = this.CATEGORIES.filter(c => c !== 'ทั้งหมด').map(cat => ({\n      label:  cat,\n      checked: currentCat === cat,\n      bg:     currentCat === cat ? '#C85A38' : '#F0E6DC',\n      color:  currentCat === cat ? 'white'   : '#2D1F15',\n      border: currentCat === cat ? '#C85A38' : '#D4B8A8',\n      select: () => this.setState({ editingCat: cat }),\n    }));\n\n    const isConfirmingDelete = deleteConfirmId !== null;\n    const deleteTarget       = isConfirmingDelete ? manageProducts.find(p => p.id === deleteConfirmId) : null;\n    const deleteTargetName   = deleteTarget ? deleteTarget.name : '';\n\n    // === Screen 5: ออนบอร์ดดิ้ง ===\n    const SHOP_TYPES = [\n      { id: 'เครื่องดื่ม', label: 'ร้านเครื่องดื่ม', emoji: '🧋', desc: 'ชานม กาแฟ น้ำปั่น' },\n      { id: 'อาหาร',       label: 'ร้านอาหาร',       emoji: '🍜', desc: 'ส้มตำ ข้าว ก๋วยเตี๋ยว' },\n      { id: 'ของชำ',       label: 'ร้านของชำ',       emoji: '🛒', desc: 'ของชำ ขนม เครื่องดื่ม' },\n    ];\n    const shopTypes = SHOP_TYPES.map(st => ({\n      ...st,\n      checked:     onboardShopType === st.id,\n      bg:          onboardShopType === st.id ? '#FFF0E8' : '#FFFAF4',\n      border:      onboardShopType === st.id ? '#C85A38' : '#EDD8C8',\n      nameColor:   onboardShopType === st.id ? '#C85A38' : '#2D1F15',\n      descColor:   onboardShopType === st.id ? '#D4785A' : '#8A7268',\n      checkBg:     onboardShopType === st.id ? '#C85A38' : 'transparent',\n      checkBorder: onboardShopType === st.id ? '#C85A38' : '#C8A090',\n      select: () => this.setState({ onboardShopType: st.id }),\n    }));\n\n    // === Screen 6: รายงานยอดขาย ===\n    const REPORT_PERIODS = ['วันนี้', 'สัปดาห์นี้', 'เดือนนี้'];\n    const periods = REPORT_PERIODS.map(p => ({\n      label: p,\n      bg:    reportPeriod === p ? '#C85A38' : 'transparent',\n      color: reportPeriod === p ? 'white'   : '#8A7268',\n      select: () => this.setState({ reportPeriod: p }),\n    }));\n\n    const maxBarAmt = Math.max(...this.SALES_BARS.map(b => b.amt));\n    const salesBars = this.SALES_BARS.map(b => ({\n      ...b,\n      heightPx: Math.round((b.amt / maxBarAmt) * 120) + 6,\n      isPeak:   b.amt === maxBarAmt,\n      barColor: b.amt === maxBarAmt ? '#C85A38' : '#E8C8B0',\n    }));\n    const totalSales  = this.SALES_BARS.reduce((s, b) => s + b.amt, 0);\n    const totalOrders = this.ORDER_HISTORY.length + 23;\n\n    const topProducts = Object.entries(this.TOP_SALES)\n      .map(([id, qty]) => {\n        const p = this.PRODUCTS.find(x => x.id === +id);\n        return p ? { ...p, qty, revenue: p.price * qty } : null;\n      })\n      .filter(Boolean)\n      .sort((a, b) => b.qty - a.qty)\n      .slice(0, 5)\n      .map((p, i) => ({ ...p, rank: i + 1 }));\n\n    // === Screen 7: ประวัติออเดอร์ ===\n    const orderHistory = this.ORDER_HISTORY.map(o => {\n      const itemCount = o.itemIds.length;\n      const paymentIcon = o.payment === 'qr' ? '📲' : o.payment === 'cash' ? '💵' : '🏦';\n      return {\n        ...o,\n        itemCount,\n        paymentIcon,\n        view: () => this.setState({ selectedOrderId: o.id }),\n      };\n    });\n\n    const isViewingOrder = selectedOrderId !== null;\n    const viewingOrderRaw = isViewingOrder ? this.ORDER_HISTORY.find(o => o.id === selectedOrderId) : null;\n    const orderDetailItems = viewingOrderRaw\n      ? Object.entries(\n          viewingOrderRaw.itemIds.reduce((acc, id) => ({ ...acc, [id]: (acc[id] || 0) + 1 }), {})\n        ).map(([id, qty]) => {\n          const p = this.PRODUCTS.find(x => x.id === +id);\n          return p ? { ...p, qty, subtotal: p.price * qty } : null;\n        }).filter(Boolean)\n      : [];\n    const orderDetailPaymentLabel = viewingOrderRaw\n      ? (viewingOrderRaw.payment === 'qr' ? 'พร้อมเพย์' : viewingOrderRaw.payment === 'cash' ? 'เงินสด' : 'โอนเงิน')\n      : '';\n\n    // === Auth: Login (เบอร์มือถือ + OTP) ===\n    const isPhoneStep = loginStep === 'phone';\n    const isOtpStep = loginStep === 'otp';\n    const sendOtp = () => this.setState({ loginStep: 'otp' });\n    const backToPhone = () => this.setState({ loginStep: 'phone' });\n\n    // === Auth: EULA ===\n    const toggleEula = () => this.setState(s => ({ eulaChecked: !s.eulaChecked }));\n    const eulaCheckBg = eulaChecked ? '#C85A38' : 'transparent';\n    const eulaCheckBorder = eulaChecked ? '#C85A38' : '#C8A090';\n    const eulaAcceptBg = eulaChecked ? '#C85A38' : '#E8D8C8';\n    const eulaAcceptColor = eulaChecked ? 'white' : '#B09080';\n\n    // === Shift: เปิดกะ ===\n    const CASH_PRESETS = [500, 1000, 2000];\n    const cashPresets = CASH_PRESETS.map(p => ({\n      amount: p,\n      bg:     openingCashPreset === p ? '#C85A38' : '#FFFAF4',\n      color:  openingCashPreset === p ? 'white'   : '#2D1F15',\n      border: openingCashPreset === p ? '#C85A38' : '#E8D0C0',\n      select: () => this.setState({ openingCashPreset: p }),\n    }));\n\n    // === Option picker (B2) ===\n    const showOptionPicker = optionPickerProductId !== null;\n    const optionProduct = showOptionPicker ? this.PRODUCTS.find(p => p.id === optionPickerProductId) : null;\n    const SWEETNESS_OPTS = ['หวานน้อย', 'หวานปกติ', 'หวานมาก'];\n    const sweetnessOptions = SWEETNESS_OPTS.map(s => ({\n      label: s,\n      bg:     optionSweetness === s ? '#C85A38' : '#F0E6DC',\n      color:  optionSweetness === s ? 'white'   : '#2D1F15',\n      select: () => this.setState({ optionSweetness: s }),\n    }));\n    const SIZE_OPTS = [{ id: 'S', delta: 0 }, { id: 'M', delta: 5 }, { id: 'L', delta: 10 }];\n    const sizeOptions = SIZE_OPTS.map(sz => ({\n      label: sz.id,\n      deltaLabel: sz.delta > 0 ? '+' + sz.delta : 'ราคาปกติ',\n      bg:     optionSize === sz.id ? '#C85A38' : '#F0E6DC',\n      color:  optionSize === sz.id ? 'white'   : '#2D1F15',\n      select: () => this.setState({ optionSize: sz.id }),\n    }));\n    const pearlBg     = optionPearl ? '#C85A38' : 'transparent';\n    const pearlBorder = optionPearl ? '#C85A38' : '#C8A090';\n    const sizeDeltaNow = (SIZE_OPTS.find(sz => sz.id === optionSize) || { delta: 0 }).delta;\n    const optionTotalPrice = optionProduct ? optionProduct.price + sizeDeltaNow + (optionPearl ? 10 : 0) : 0;\n\n    // === Barcode scan overlay (B5) ===\n    // (ใช้ showScanOverlay ตรงๆ ในเทมเพลต)\n\n    // === Cash calculator (B4) ===\n    const CASH_RECEIVE_PRESETS = [100, 500, 1000];\n    const cashReceiveChips = CASH_RECEIVE_PRESETS.map(p => ({\n      amount: p,\n      bg:     cashReceivedPreset === p ? '#C85A38' : '#FFFAF4',\n      color:  cashReceivedPreset === p ? 'white'   : '#2D1F15',\n      border: cashReceivedPreset === p ? '#C85A38' : '#E8D0C0',\n      select: () => this.setState({ cashReceivedPreset: p }),\n    }));\n    const exactBg     = cashReceivedPreset === 'exact' ? '#C85A38' : '#FFFAF4';\n    const exactColor  = cashReceivedPreset === 'exact' ? 'white'   : '#2D1F15';\n    const exactBorder = cashReceivedPreset === 'exact' ? '#C85A38' : '#E8D0C0';\n    const selectExactCash = () => this.setState({ cashReceivedPreset: 'exact' });\n\n    // === ปิดกะ (B6) ===\n    const shiftOpeningCash = 500; // จำลองยอดเปิดกะที่บันทึกไว้ก่อนหน้า\n    const shiftCashSalesTotal = 425; // จำลองยอดขายเงินสดสะสมระหว่างกะ\n    const shiftExpectedCash = shiftOpeningCash + shiftCashSalesTotal;\n    const shiftVariance = closingCashCounted - shiftExpectedCash;\n    const shiftIsMatched = shiftVariance === 0;\n    const shiftIsOver = shiftVariance > 0;\n    const shiftIsShort = shiftVariance < 0;\n    const adjustClosingCash = (delta) => this.setState(s => ({ closingCashCounted: Math.max(0, s.closingCashCounted + delta) }));\n    const increaseClosingCash = () => adjustClosingCash(50);\n    const decreaseClosingCash = () => adjustClosingCash(-50);\n\n    // === หน้ารวมจัดการร้าน (C1) ===\n    const isOwnerView = viewRole === 'owner';\n    const isStaffView = viewRole === 'staff';\n    const roleToggleLabel = isOwnerView ? '👑 มุมมอง: เจ้าของร้าน' : '🧑‍🍳 มุมมอง: พนักงาน';\n\n    // === ตั้งค่าร้าน (C3) ===\n    const THEME_COLORS = ['#C85A38', '#2A7F52', '#3B6FA8', '#7E5BB5', '#B8546B'];\n    const themeColors = THEME_COLORS.map(c => ({\n      color: c,\n      isSelected: themeColorSelected === c,\n      select: () => this.selectThemeColor(c),\n    }));\n\n    // === โปรโมชั่น (C4) ===\n    const promotions = this.PROMOTIONS.map(p => {\n      const userOn = !!promoActiveToggle[p.id];\n      const isActive = userOn && p.dateState === 'active';\n      const isUpcoming = userOn && p.dateState === 'upcoming';\n      const statusLabel = !userOn ? 'ปิดใช้งาน' : isActive ? 'กำลังใช้งาน' : isUpcoming ? 'รอเริ่ม' : 'หมดเขตแล้ว';\n      const statusBg = !userOn ? '#F0E6DC' : isActive ? '#E0F0E6' : isUpcoming ? '#E8EEF8' : '#F0E0E0';\n      const statusColor = !userOn ? '#8A7268' : isActive ? '#1F6440' : isUpcoming ? '#2A569A' : '#A04040';\n      return {\n        ...p, userOn, statusLabel, statusBg, statusColor,\n        toggleBg: userOn ? '#2A7F52' : '#E8D0C0',\n        toggleKnobLeft: userOn ? '26px' : '2px',\n        toggle: () => this.togglePromoActive(p.id),\n      };\n    });\n\n    // === พนักงาน (C5) ===\n    const staffList = this.STAFF_LIST.map(s => ({\n      ...s,\n      statusLabel: s.status === 'accepted' ? 'เข้าร่วมแล้ว' : 'รอยืนยัน',\n      statusBg:    s.status === 'accepted' ? '#E0F0E6' : '#FFF3E0',\n      statusColor: s.status === 'accepted' ? '#1F6440' : '#B8740A',\n    }));\n\n    // === สต็อก (C8) ===\n    const stockProducts = this.PRODUCTS.slice(0, 8).map((p, i) => ({\n      ...p,\n      tracked: i % 3 !== 2,\n      qty: 24 - i * 2,\n      isLow: (24 - i * 2) <= 10,\n    }));\n\n    // === ประวัติกะ (C9) ===\n    const shiftHistory = this.SHIFT_HISTORY.map(s => ({\n      ...s,\n      isMatched: s.variance === 0,\n      isOver: s.variance > 0,\n      isShort: s.variance < 0,\n      varianceLabel: s.variance === 0 ? 'ตรงกัน' : s.variance > 0 ? ('เกิน ฿' + s.variance) : ('ขาด ฿' + Math.abs(s.variance)),\n      varianceColor: s.variance === 0 ? '#1F6440' : s.variance > 0 ? '#B8740A' : '#B83030',\n    }));\n\n    // === Billing: แบนเนอร์เตือน trial (D2) ===\n    const trialBannerLabel = 'เหลือเวลาทดลองใช้ ' + trialBannerDay + ' วัน';\n    const trialBannerBg = trialBannerDay <= 1 ? '#FCE8E0' : trialBannerDay <= 3 ? '#FFF3E0' : '#E8EEF8';\n    const trialBannerColor = trialBannerDay <= 1 ? '#B83030' : trialBannerDay <= 3 ? '#B8740A' : '#2A569A';\n    const trialBannerIcon = trialBannerDay <= 1 ? '⏰' : trialBannerDay <= 3 ? '⚠️' : 'ℹ️';\n\n    // === Billing: หน้า Locked (D1) ===\n    const isCheckingPayment = billingCheckState === 'checking';\n    const isPaymentConfirmed = billingCheckState === 'confirmed';\n    const isPaymentIdle = billingCheckState === 'idle';\n    const checkButtonLabel = isPaymentIdle ? 'ฉันจ่ายแล้ว' : isCheckingPayment ? 'กำลังตรวจสอบ...' : 'ตรวจสอบอีกครั้ง';\n\n    const now = new Date();\n    const hh = String(now.getHours()).padStart(2, '0');\n    const mm = String(now.getMinutes()).padStart(2, '0');\n    const orderNum = Math.floor(100 + (now.getMinutes() * 7 + now.getHours() * 3) % 900);\n\n    return {\n      filteredProducts,\n      cartItems,\n      categories,\n      paymentMethods,\n      cartTotal,\n      cartCount: cartCount || 0,\n      hasCart,\n      isEmpty,\n      showQR,\n      showCash,\n      confirmed,\n      notConfirmed,\n      orderNum,\n      timeNow:    hh + ':' + mm,\n      cartBadgeBg:    hasCart ? '#F4A22A' : 'transparent',\n      cartBadgeColor: hasCart ? '#2D1F15' : 'transparent',\n      confirmPayment: () => this.setState({ confirmed: true }),\n      resetAll:       () => this.setState({ cart: {}, confirmed: false }),\n\n      // === Screen 4: จัดการสินค้า ===\n      manageProducts,\n      productCount: manageProducts.length,\n      isEditing,\n      editingName,\n      editingPrice,\n      editCats,\n      isConfirmingDelete,\n      deleteTargetName,\n      closeEdit:     () => this.setState({ editingProductId: null, editingCat: null }),\n      saveEdit:      () => this.setState({ editingProductId: null, editingCat: null }),\n      cancelDelete:  () => this.setState({ deleteConfirmId: null }),\n      confirmDelete: () => this.setState(s => ({\n        deletedIds:     [...s.deletedIds, s.deleteConfirmId],\n        deleteConfirmId: null,\n      })),\n\n      // === Screen 5: ออนบอร์ดดิ้ง ===\n      shopTypes,\n\n      // === Screen 6: รายงานยอดขาย ===\n      periods,\n      salesBars,\n      totalSales,\n      totalOrders,\n      topProducts,\n\n      // === Screen 7: ประวัติออเดอร์ ===\n      orderHistory,\n      isViewingOrder,\n      orderDetailItems,\n      orderDetailPaymentLabel,\n      viewingOrderId:    viewingOrderRaw ? viewingOrderRaw.id    : '',\n      viewingOrderTime:  viewingOrderRaw ? viewingOrderRaw.time  : '',\n      viewingOrderTotal: viewingOrderRaw ? viewingOrderRaw.total : 0,\n      closeOrderDetail:  () => this.setState({ selectedOrderId: null }),\n\n      // === Auth: Login ===\n      isPhoneStep,\n      isOtpStep,\n      sendOtp,\n      backToPhone,\n\n      // === Auth: EULA ===\n      eulaChecked,\n      toggleEula,\n      eulaCheckBg,\n      eulaCheckBorder,\n      eulaAcceptBg,\n      eulaAcceptColor,\n\n      // === Shift: เปิดกะ ===\n      cashPresets,\n      openingCashPreset,\n\n      // === Option picker (B2) ===\n      showOptionPicker,\n      optionProductName: optionProduct ? optionProduct.name : '',\n      optionProductEmoji: optionProduct ? optionProduct.emoji : '',\n      optionProductBg: optionProduct ? optionProduct.bg : '#E8D0C0',\n      sweetnessOptions,\n      sizeOptions,\n      optionPearl,\n      pearlBg,\n      pearlBorder,\n      optionTotalPrice,\n      togglePearl: () => this.setState(s => ({ optionPearl: !s.optionPearl })),\n      closeOptionPicker: () => this.closeOptionPicker(),\n      confirmOptionAdd: () => this.confirmOptionAdd(),\n\n      // === Barcode scan (B5) ===\n      showScanOverlay,\n      openScan: () => this.openScan(),\n      closeScan: () => this.closeScan(),\n      scanAndAdd: () => this.scanAndAdd(),\n\n      // === ส่วนลด/เงินทอน (B4) ===\n      promoApplied,\n      discountAmount,\n      finalTotal,\n      cashReceiveChips,\n      exactBg, exactColor, exactBorder, selectExactCash,\n      changeDue,\n      insufficientPay,\n\n      // === ปิดกะ (B6) ===\n      shiftOpeningCash,\n      shiftCashSalesTotal,\n      shiftExpectedCash,\n      closingCashCounted,\n      shiftVariance,\n      shiftIsMatched,\n      shiftIsOver,\n      shiftIsShort,\n      adjustClosingCash,\n      increaseClosingCash,\n      decreaseClosingCash,\n\n      // === หน้ารวมจัดการร้าน (C1) ===\n      isOwnerView,\n      isStaffView,\n      roleToggleLabel,\n      toggleViewRole: () => this.toggleViewRole(),\n\n      // === ตั้งค่าร้าน (C3) ===\n      themeColors,\n\n      // === โปรโมชั่น (C4) ===\n      promotions,\n\n      // === พนักงาน (C5) ===\n      staffList,\n\n      // === สต็อก (C8) ===\n      stockProducts,\n\n      // === ประวัติกะ (C9) ===\n      shiftHistory,\n\n      // === Billing (ชุด 4) ===\n      trialBannerLabel,\n      trialBannerBg,\n      trialBannerColor,\n      trialBannerIcon,\n      cycleTrialBanner: () => this.cycleTrialBanner(),\n      isCheckingPayment,\n      isPaymentConfirmed,\n      isPaymentIdle,\n      checkButtonLabel,\n      checkPayment: () => this.checkPayment(),\n    };\n  }\n}\n\n<\/script>\n\n\n<\/body><\/html>"
  </script>
